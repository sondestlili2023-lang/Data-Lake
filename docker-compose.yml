services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: velib
      POSTGRES_USER: velib
      POSTGRES_PASSWORD: velib123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velib -d velib"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/velib-raw;
      mc mb --ignore-existing local/velib-staging;
      mc mb --ignore-existing local/velib-curated;
      echo 'MinIO buckets ready (raw / staging / curated)';
      "

  metabase:
    image: metabase/metabase:v0.51.3
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: velib
      MB_DB_PASS: velib123
      MB_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  db-schema-init:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: velib123
    volumes:
      - ./schema:/schema:ro
    entrypoint: >
      /bin/sh -c "
      psql -h db -U velib -d velib -f /schema/migrate_executive.sql;
      echo 'Executive migration applied';
      "
    restart: "no"

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      db-schema-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://velib:velib123@db:5432/velib
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CITYBIKES_API_URL: https://api.citybik.es/v2
      INGEST_SCOPE: ${INGEST_SCOPE:-paris}
      VELIB_GBFS_BASE: ${VELIB_GBFS_BASE:-https://velib-metropole-opendata.smovengo.cloud/opendata/Velib_Metropole}
      JCDECAUX_API_URL: https://api.jcdecaux.com/vls/v1
      JCDECAUX_API_KEY: ${JCDECAUX_API_KEY:-}
      JCDECAUX_CONTRACTS: ${JCDECAUX_CONTRACTS:-}
      ENABLE_JCDECAUX: ${ENABLE_JCDECAUX:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      OPENCLAW_CONFIG_PATH: ${OPENCLAW_CONFIG_PATH:-/openclaw-config/openclaw.json}
      OPENCLAW_AUTO_RESTART: ${OPENCLAW_AUTO_RESTART:-true}
      OPENCLAW_WHATSAPP_SENDER: ${OPENCLAW_WHATSAPP_SENDER:-+33781744135}
      ALERT_SNOOZE_HOURS: ${ALERT_SNOOZE_HOURS:-6}
      ALERTS_ADMIN_TOKEN: ${ALERTS_ADMIN_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-C:/Users/secre/.openclaw}:/openclaw-config:rw
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
